name: conta_mobile
description: Collect_audio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  supabase_flutter: ^2.5.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  record: ^6.2.0
  just_audio: ^0.9.0
  file_picker: ^8.0.0
  permission_handler: ^11.0.0
  connectivity_plus: ^6.0.0
  flutter_dotenv: ^5.1.0  
  intl: ^0.19.0
  uuid: ^4.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env 
