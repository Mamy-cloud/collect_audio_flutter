name: mon_application
description: Nouvelle application Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Base de données locale
  sqflite: ^2.3.0
  path:    ^1.9.0

  # Lecture audio — compatible Android/iOS
  audioplayers: ^6.0.0

  # Enregistrement audio — Android/iOS
  flutter_sound:      ^9.0.0
  permission_handler: ^11.0.0

  # UUID pour les clés primaires
  uuid: ^4.4.0

  # Image — Android/iOS
  image_picker:  ^1.0.0
  path_provider: ^2.1.0

  # Appels API REST
  http: ^1.2.0

  # Détection connexion réseau
  connectivity_plus: ^6.0.0

  # Préférences locale
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
