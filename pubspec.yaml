name: conta_mobile
description: Conta Mobile — Enregistrement de témoins

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Base de données locale
  sqflite: ^2.3.0
  path: ^1.9.0

  # Appels API REST vers FastAPI
  http: ^1.2.0

  # Audio
  record: ^5.1.2
  audioplayers: ^6.0.0
  file_picker: ^8.0.0
  permission_handler: ^11.0.0
  path_provider: ^2.1.0

  # Préférences locales
  shared_preferences: ^2.2.0

  # UUID (optionnel — si besoin côté Flutter)
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
